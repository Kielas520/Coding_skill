# 全局默认配置
# 模块级配置由各模块在初始化时传入自己的 config dict

hardware:
  # true = Mock 模拟环境, false = 真实硬件
  mock: true
  # 传感器模拟噪声水平（标准差，单位：m）
  noise_level: 0.01
  # 模拟运动时间（秒），模拟机械臂移动延迟
  move_time: 0.3

executor:
  # 状态机轮询频率（Hz）
  tick_rate: 50
  # 单步最大重试次数
  max_retries: 3
  # 到位精度（m），位置误差小于此值视为到达
  arrival_tolerance: 0.005

task:
  # 任务队列最大长度
  max_queue_size: 20
  # 允许的指令类型
  allowed_actions:
    - move_to
    - grasp
    - release
    - wait
    - read_sensor

logging:
  # 日志级别：DEBUG / INFO / WARNING / ERROR
  level: INFO
  format: "[%(asctime)s] [%(levelname)s] [%(name)s] %(message)s"
